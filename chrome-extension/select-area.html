<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>选择截图区域</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #333;
            overflow: hidden;
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .screenshot-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #screenshotImage {
            max-width: 100%;
            max-height: 100%;
            cursor: crosshair;
        }
        .selection {
            position: absolute;
            border: 2px solid #4CAF50;
            background-color: rgba(76, 175, 80, 0.2);
            pointer-events: none;
        }
        .toolbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 25px;
            display: flex;
            gap: 10px;
        }
        .button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .button.primary {
            background-color: #4CAF50;
            color: white;
        }
        .button.secondary {
            background-color: #666;
            color: white;
        }
        .instructions {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="instructions">
            按住鼠标左键拖动选择截图区域，然后点击确认按钮
        </div>
        
        <div class="screenshot-container">
            <img id="screenshotImage" src="" alt="截图">
            <div id="selection" class="selection" style="display: none;"></div>
        </div>
        
        <div class="toolbar">
            <button id="confirmBtn" class="button primary">确认</button>
            <button id="cancelBtn" class="button secondary">取消</button>
        </div>
    </div>
    <script src="select-area.js"></script>
</body>
</html>
