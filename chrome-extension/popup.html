<!DOCTYPE html> 
 <html> 
 <head> 
     <meta charset="UTF-8"> 
     <title>灵感采集插件</title> 
     <style> 
         body { 
             width: 300px; 
             padding: 20px; 
             font-family: Arial, sans-serif; 
         } 
         .container { 
             display: flex; 
             flex-direction: column; 
             gap: 15px; 
         } 
         .header { 
             text-align: center; 
             font-size: 16px; 
             font-weight: bold; 
             margin-bottom: 10px; 
         } 
         .status { 
             padding: 10px; 
             border-radius: 4px; 
             background-color: #f0f0f0; 
         } 
         .status.loading { 
             background-color: #e3f2fd; 
         } 
         .status.success { 
             background-color: #e8f5e8; 
         } 
         .status.error { 
             background-color: #ffebee; 
         } 
         .button { 
             padding: 10px; 
             border: none; 
             border-radius: 4px; 
             background-color: #4CAF50; 
             color: white; 
             cursor: pointer; 
             font-size: 14px; 
         } 
         .button:hover { 
             background-color: #45a049; 
         } 
         .button:disabled { 
             background-color: #cccccc; 
             cursor: not-allowed; 
         } 
         .progress { 
             width: 100%; 
             height: 8px; 
             background-color: #f0f0f0; 
             border-radius: 4px; 
             overflow: hidden; 
         } 
         .progress-bar { 
             height: 100%; 
             background-color: #4CAF50; 
             width: 0%; 
             transition: width 0.3s ease; 
         } 
         .info { 
             font-size: 12px; 
             color: #666; 
             text-align: center; 
         } 
         .option { 
             display: flex; 
             align-items: center; 
             gap: 8px; 
             font-size: 14px; 
             margin: 5px 0; 
         } 
         .option input[type="checkbox"] { 
             cursor: pointer; 
         } 
         .loading-overlay { 
             position: fixed; 
             top: 0; 
             left: 0; 
             right: 0; 
             bottom: 0; 
             background-color: rgba(255, 255, 255, 0.9); 
             display: flex; 
             flex-direction: column; 
             justify-content: center; 
             align-items: center; 
             z-index: 1000; 
         } 
         .loading-spinner { 
             width: 40px; 
             height: 40px; 
             border: 4px solid #f3f3f3; 
             border-top: 4px solid #4CAF50; 
             border-radius: 50%; 
             animation: spin 1s linear infinite; 
             margin-bottom: 15px; 
         } 
         @keyframes spin { 
             0% { transform: rotate(0deg); } 
             100% { transform: rotate(360deg); } 
         } 
         .loading-text { 
             font-size: 14px; 
             color: #333; 
             text-align: center; 
         } 
     </style> 
 </head> 
 <body> 
     <div class="container"> 
         <div class="header">灵感采集插件</div> 
         <div id="status" class="status">点击开始采集</div> 
         <div class="progress"> 
             <div id="progressBar" class="progress-bar"></div> 
         </div> 
         <div class="option"> 
             <input type="checkbox" id="fullScreenScreenshot" checked> 
             <label for="fullScreenScreenshot">全屏截图</label> 
         </div> 
         <button id="collectBtn" class="button">开始采集</button> 
         <button id="historyBtn" class="button" style="background-color: #2196F3; margin-top: 10px;">历史记录</button> 
         <div id="historySection" style="display: none; margin-top: 10px;"> 
             <h3 style="margin: 10px 0; font-size: 14px;">历史记录</h3> 
             <div id="historyList" style="max-height: 200px; overflow-y: auto; font-size: 12px;"> 
                 <!-- 历史记录将在这里显示 --> 
             </div> 
         </div> 
         <div id="info" class="info">当前页面: <span id="currentPage"></span></div> 
     </div> 
     
     <!-- 加载窗口 --> 
     <div id="loadingOverlay" class="loading-overlay" style="display: none;"> 
         <div class="loading-spinner"></div> 
         <div class="loading-text" id="loadingText">正在分析图片...</div> 
     </div> 
     <script src="popup.js"></script> 
 </body> 
 </html>
