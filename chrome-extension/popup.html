<!DOCTYPE html> 
 <html> 
 <head> 
     <meta charset="UTF-8"> 
     <title>灵感采集插件</title> 
     <style> 
         body { 
             width: 320px; 
             padding: 16px; 
             font-family: Arial, sans-serif; 
             box-sizing: border-box;
         } 
         .container { 
             display: flex; 
             flex-direction: column; 
             gap: 15px; 
         } 
         .header { 
             text-align: center; 
             font-size: 16px; 
             font-weight: bold; 
             margin-bottom: 10px; 
         } 
         .status { 
             padding: 10px; 
             border-radius: 4px; 
             background-color: #f0f0f0; 
         } 
         .status.loading { 
             background-color: #e3f2fd; 
         } 
         .status.success { 
             background-color: #e8f5e8; 
         } 
         .status.error { 
             background-color: #ffebee; 
         } 
         .button { 
             padding: 10px; 
             border: none; 
             border-radius: 4px; 
             background-color: #4CAF50; 
             color: white; 
             cursor: pointer; 
             font-size: 14px; 
         } 
         .button:hover { 
             background-color: #45a049; 
         } 
         .button:disabled { 
             background-color: #cccccc; 
             cursor: not-allowed; 
         } 
         .progress { 
             width: 100%; 
             height: 8px; 
             background-color: #f0f0f0; 
             border-radius: 4px; 
             overflow: hidden; 
         } 
         .progress-bar { 
             height: 100%; 
             background-color: #4CAF50; 
             width: 0%; 
             transition: width 0.3s ease; 
         } 
         .info { 
             font-size: 12px; 
             color: #666; 
             text-align: center; 
         } 
         .option { 
             display: flex; 
             align-items: center; 
             gap: 8px; 
             font-size: 14px; 
             margin: 5px 0; 
         } 
         .option input[type="checkbox"] { 
             cursor: pointer; 
         } 
         .loading-overlay { 
             position: fixed; 
             top: 0; 
             left: 0; 
             right: 0; 
             bottom: 0; 
             background-color: rgba(255, 255, 255, 0.9); 
             display: flex; 
             flex-direction: column; 
             justify-content: center; 
             align-items: center; 
             z-index: 1000; 
         } 
         .loading-spinner { 
             width: 40px; 
             height: 40px; 
             border: 4px solid #f3f3f3; 
             border-top: 4px solid #4CAF50; 
             border-radius: 50%; 
             animation: spin 1s linear infinite; 
             margin-bottom: 15px; 
         } 
         @keyframes spin { 
             0% { transform: rotate(0deg); } 
             100% { transform: rotate(360deg); } 
         } 
         .loading-text { 
             font-size: 14px; 
             color: #333; 
             text-align: center; 
         }
         .settings-panel {
             border: 1px solid #e0e0e0;
             border-radius: 6px;
             padding: 10px;
             background: #fafafa;
             font-size: 12px;
         }
         .settings-panel label {
             display: block;
             margin-top: 8px;
             color: #444;
             font-weight: bold;
         }
         .settings-panel label:first-of-type { margin-top: 0; }
         .settings-panel input[type="text"],
         .settings-panel input[type="password"],
         .settings-panel input[type="url"] {
             width: 100%;
             box-sizing: border-box;
             margin-top: 4px;
             padding: 6px 8px;
             border: 1px solid #ccc;
             border-radius: 4px;
             font-size: 12px;
         }
         .settings-hint {
             font-size: 11px;
             color: #777;
             margin-top: 4px;
             line-height: 1.35;
         }
         .btn-secondary {
             background-color: #607d8b !important;
             margin-top: 8px;
         }
         .btn-secondary:hover { background-color: #546e7a !important; }
         .btn-link {
             background: none !important;
             color: #1976d2 !important;
             text-decoration: underline;
             font-size: 12px;
             padding: 6px 0 !important;
             margin-top: 4px;
         }
     </style> 
 </head> 
 <body> 
     <div class="container"> 
         <div class="header">灵感采集插件</div> 
         <div id="status" class="status">点击开始采集</div> 
         <div class="progress"> 
             <div id="progressBar" class="progress-bar"></div> 
         </div> 
         <div class="option"> 
             <input type="checkbox" id="fullScreenScreenshot" checked> 
             <label for="fullScreenScreenshot">全屏截图</label> 
         </div> 
         <button id="collectBtn" class="button">开始采集</button> 
         <button id="historyBtn" class="button" style="background-color: #2196F3; margin-top: 10px;">历史记录</button>
         <button type="button" id="toggleSettingsBtn" class="button btn-link">API 设置（必填通义）</button>
         <div id="settingsPanel" class="settings-panel" style="display: none;">
             <label for="dashScopeKeyInput">通义千问 API Key（DashScope）<span style="color:#c62828">*</span></label>
             <input type="password" id="dashScopeKeyInput" autocomplete="off" placeholder="sk-...">
             <p class="settings-hint">阿里云 DashScope 控制台创建。扩展<strong>直连</strong>通义与飞书，<strong>无需</strong>本地 <code>npm run dev</code>。密钥仅存本机扩展存储。</p>
             <label for="feishuAppIdInput">飞书 App ID（上传表格用）</label>
             <input type="text" id="feishuAppIdInput" autocomplete="off" placeholder="cli_xxxx">
             <label for="feishuAppSecretInput">飞书 App Secret</label>
             <input type="password" id="feishuAppSecretInput" autocomplete="off" placeholder="应用密钥">
             <p class="settings-hint">仅在点击「上传到飞书」时需要；与多维表格链接中的 base 应用一致。内部分发请勿外传扩展包。</p>
             <button type="button" id="saveSettingsBtn" class="button btn-secondary" style="width: 100%;">保存设置</button>
             <p id="settingsSaveHint" class="settings-hint" style="margin-top: 8px; color: #2e7d32;"></p>
         </div>
         <div id="historySection" style="display: none; margin-top: 10px;"> 
             <h3 style="margin: 10px 0; font-size: 14px;">历史记录</h3> 
             <div id="historyList" style="max-height: 200px; overflow-y: auto; font-size: 12px;"> 
                 <!-- 历史记录将在这里显示 --> 
             </div> 
         </div> 
         <div id="info" class="info">当前页面: <span id="currentPage"></span></div> 
     </div> 
     
     <!-- 加载窗口 --> 
     <div id="loadingOverlay" class="loading-overlay" style="display: none;"> 
         <div class="loading-spinner"></div> 
         <div class="loading-text" id="loadingText">正在分析图片...</div> 
     </div> 
     <script src="popup.js"></script> 
 </body> 
 </html>
